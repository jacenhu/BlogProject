language: node_js

node_js:
  - 18

cache:
  directories:
    - node_modules

install:
  - npm install

script:
  - npm run build

after_script:
  - set -e
  - cd docs/.vitepress/dist
  - git init
  - git config user.name "${USER_NAME}"
  - git config user.email "${USER_EMAIL}"
  - git add .
  - git commit -m "update jacen's blog"
  - git push --force --quiet "https://${GITHUB_TOKEN}@${GITHUB_REPO}" master
